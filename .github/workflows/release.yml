name: Release

on:
  release:
    types: [published]

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore QuickMember.sln

      - name: Build
        run: dotnet build QuickMember.sln --configuration ${{ env.CONFIGURATION }} --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test QuickMember.sln --configuration ${{ env.CONFIGURATION }} --no-build

      - name: Pack
        run: dotnet pack QuickMember/QuickMember.csproj --configuration ${{ env.CONFIGURATION }} --no-build --output ./artifacts /p:Version=${{ steps.version.outputs.version }}

      - name: Validate packages
        run: |
          dotnet tool install --global dotnet-validate --version 0.0.1-preview.582 --allow-roll-forward
          for pkg in ./artifacts/*.nupkg; do
            echo "Validating $pkg"
            dotnet-validate package local "$pkg"
          done

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Attach packages to release
        run: gh release upload "${{ github.ref_name }}" ./artifacts/*.nupkg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
