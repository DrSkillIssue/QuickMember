name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore QuickMember.sln

      - name: Build
        run: dotnet build QuickMember.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test QuickMember.sln --configuration ${{ env.CONFIGURATION }} --no-build --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 7

  pack:
    name: Pack & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: |
          dotnet restore QuickMember.sln
          dotnet pack QuickMember/QuickMember.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --output ./artifacts

      - name: Validate packages
        run: |
          dotnet tool install --global dotnet-validate --version 0.0.1-preview.582 --allow-roll-forward
          for pkg in ./artifacts/*.nupkg; do
            echo "Validating $pkg"
            dotnet-validate package local "$pkg"
          done

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: packages
          path: ./artifacts/*.nupkg
          retention-days: 30

  status:
    name: CI Status
    if: always() && !cancelled()
    needs: [build, pack]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        env:
          CI_SUCCESS: ${{ !contains(needs.*.result, 'failure') }}
        run: |
          if [ "${CI_SUCCESS}" == "true" ]; then
            echo "All jobs passed"
          else
            echo "One or more jobs failed"
            exit 1
          fi
